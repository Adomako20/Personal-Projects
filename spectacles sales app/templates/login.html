{% extends "base.html" %}

<!-- title block -->
{% block title %}Login Page{% endblock %}

<!-- menu bar block -->
{% block menubar %} {% endblock %}

<!-- body block -->
{% block body %}
<div class="main-box">
  <!-- inner box -->
  <div class="sub-box">
    <!-- title -->
    <h2 class="wel-title">Welcome</h2>

    <!-- forms -->
    <form action="{{url_for('auth.loggedIn')}}" method="post">
      <input
        type="text"
        placeholder="Username"
        autofocus
        required
        name="username"
      />
      <input type="password" placeholder="Password" required name="password" />
      <button type="submit">Log in</button>
    </form>

    {% with message = get_flashed_messages(with_categories = True) %} {% if
    message%} {% for c, m in message %}
    <p class="{{c}} message">{{m}}</p>
    {% endfor %} {% endif %} {% endwith %}
  </div>
</div>
{% endblock %}
